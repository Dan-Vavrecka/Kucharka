<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Upravit recept</title>
    <link rel="stylesheet" href="style_p.css">
</head>
<body>
<header>
    <div class="header-overlay">
        <a href="index1.html"><h1><span class="orange">Dannyho</span> kuchařka.cz</h1></a>
    </div>
</header>
<section class="form-wrapper">
    <h2 class="section-title">Upravit recept</h2>
    <div class="form-container">
        <div class="labels">
            <label>Název receptu:</label>
            <label>Země původu:</label>
            <label>Doba přípravy:</label>
            <label>Náročnost přípravy:</label>
        </div>
        <form class="inputs" id="editForm">
            <input type="text" name="name" id="edit-name" required>
            <select name="origin" id="edit-origin">
                <option value="Česká republika">Česká republika</option>
                <option value="USA">USA</option>
                <option value="Itálie">Itálie</option>
            </select>
            <input type="time" name="prepTime" id="edit-time">
            <input type="number" name="difficulty" id="edit-diff" min="1" max="3">
        </form>
    </div>
    <div class="submit-circle" id="updateBtn" style="cursor:pointer">✓</div>
</section>
<script src="app.js"></script>
</body>
</html>
